name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to deploy (comma-separated: api,ai,auth,stats_consumer) or "all"'
        required: false
        default: 'all'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Detect which services need to be (re)deployed.
  #
  # Cascade rules:
  #   pkg/domain | pkg/server | pkg/shared  →  api + ai + stats_consumer
  #   pkg/billing                            →  api + ai
  #   services/api/**                        →  api
  #   services/ai/**                         →  ai
  #   services/auth/**                       →  auth
  #   services/stats_consumer/**             →  stats_consumer
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine affected services
        id: detect
        run: |
          declare -A SEEN
          SERVICES=()

          add_service() {
            local svc=$1
            if [ -z "${SEEN[$svc]+x}" ]; then
              SEEN[$svc]=1
              SERVICES+=("$svc")
            fi
          }

          # workflow_dispatch: deploy specified services or all
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.services }}"
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              add_service api
              add_service ai
              add_service auth
              add_service stats_consumer
            else
              IFS=',' read -ra SVCS <<< "$INPUT"
              for svc in "${SVCS[@]}"; do
                add_service "$(echo "$svc" | tr -d ' ')"
              done
            fi
          else
            # First commit has no parent — diff against the commit itself
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              CHANGED=$(git diff --name-only HEAD~1 HEAD)
            else
              CHANGED=$(git diff-tree --no-commit-id -r --name-only HEAD)
            fi
            echo "Changed files:"
            echo "$CHANGED"

            # Shared packages that affect every service
            if echo "$CHANGED" | grep -qE '^pkg/(domain|server|shared)/'; then
              add_service api
              add_service ai
              add_service stats_consumer
            fi

            # billing affects api + ai only
            if echo "$CHANGED" | grep -qE '^pkg/billing/'; then
              add_service api
              add_service ai
            fi

            # Per-service changes
            echo "$CHANGED" | grep -qE '^services/api/'            && add_service api            || true
            echo "$CHANGED" | grep -qE '^services/ai/'             && add_service ai             || true
            echo "$CHANGED" | grep -qE '^services/auth/'           && add_service auth           || true
            echo "$CHANGED" | grep -qE '^services/stats_consumer/' && add_service stats_consumer || true
          fi

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
          else
            JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -Rsc 'split("\n") | map(select(. != ""))')
            echo "Services to deploy: $JSON"
            echo "services=$JSON" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Build, release, and deploy each affected service.
  #
  # Version bump priority:
  #   1. PR label:            major | minor | patch
  #   2. Conventional commit: BREAKING CHANGE / feat / fix|chore|...
  #   3. Default:             patch
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy ${{ matrix.service }}
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    # Prevent concurrent deployments of the same service
    concurrency:
      group: deploy-${{ matrix.service }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    strategy:
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can compare against previous tags

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # ── 1. Determine next semantic version ────────────────────────────────
      - name: Determine next version
        id: semver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SERVICE=${{ matrix.service }}

          git fetch --tags
          LATEST_TAG=$(git tag -l "${SERVICE}-v*" | sort -V | tail -n1)
          echo "Latest tag: ${LATEST_TAG:-<none>}"

          # ── Find the PR that was just merged ──────────────────────────────
          PR_NUMBER=$(gh pr list \
            --state merged \
            --base main \
            --limit 10 \
            --json number,mergeCommit \
            --jq ".[] | select(.mergeCommit.oid == \"${{ github.sha }}\") | .number" \
            2>/dev/null | head -n1 || echo "")

          BUMP="patch"  # default

          # ── Priority 1: explicit PR label ─────────────────────────────────
          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view "$PR_NUMBER" \
              --json labels \
              --jq '[.labels[].name] | join(" ")' 2>/dev/null || echo "")
            echo "PR #$PR_NUMBER labels: ${LABELS:-<none>}"
            if   echo "$LABELS" | grep -qw "major"; then BUMP="major"
            elif echo "$LABELS" | grep -qw "minor"; then BUMP="minor"
            elif echo "$LABELS" | grep -qw "patch"; then BUMP="patch"
            fi
          fi

          # ── Priority 2: conventional commits since last tag ───────────────
          if [ "$BUMP" = "patch" ] && [ -n "$LATEST_TAG" ]; then
            RANGE="${LATEST_TAG}..HEAD"
            COMMITS=$(git log "$RANGE" --pretty=%s 2>/dev/null || echo "")
            if   echo "$COMMITS" | grep -qE "(BREAKING CHANGE|^[a-z]+(\(.+\))?!:)"; then BUMP="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:";                        then BUMP="minor"
            fi
          fi

          # ── Calculate new version ─────────────────────────────────────────
          if [ -z "$LATEST_TAG" ]; then
            VERSION="v0.1.0"
          else
            CURRENT=${LATEST_TAG#${SERVICE}-v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case $BUMP in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          TAG="${SERVICE}-${VERSION}"
          echo "bump=$BUMP"       >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "✅ $SERVICE: $LATEST_TAG → $TAG (bump=$BUMP)"

      # ── 2. Connect to private network ─────────────────────────────────────
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.72.0

      # ── 3. Build binary for linux/amd64 ───────────────────────────────────
      - name: Build binary
        run: |
          SERVICE=${{ matrix.service }}
          VERSION=${{ steps.semver.outputs.version }}

          cd services/$SERVICE
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.service=${SERVICE}" \
            -o "$SERVICE" \
            .
          mv "$SERVICE" ../..
          echo "✅ Built $SERVICE $VERSION"

      # ── 4. Tag + GitHub Release ────────────────────────────────────────────
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SERVICE=${{ matrix.service }}
          VERSION=${{ steps.semver.outputs.version }}
          TAG=${{ steps.semver.outputs.tag }}
          BUMP=${{ steps.semver.outputs.bump }}

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$SERVICE $VERSION" \
            --notes "**Service:** \`$SERVICE\`
          **Version:** \`$VERSION\`
          **Bump type:** \`$BUMP\`
          **Commit:** \`${{ github.sha }}\`" \
            "$SERVICE"

      # ── 5. Install Nomad CLI ───────────────────────────────────────────────
      - name: Install Nomad
        run: |
          NOMAD_VERSION=$(curl -fsSL https://checkpoint-api.hashicorp.com/v1/check/nomad \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['current_version'])")
          curl -fsSL "https://releases.hashicorp.com/nomad/${NOMAD_VERSION}/nomad_${NOMAD_VERSION}_linux_amd64.zip" \
            -o /tmp/nomad.zip
          sudo unzip -q -o /tmp/nomad.zip -d /usr/local/bin/
          nomad version

      # ── 6. Deploy via Nomad ────────────────────────────────────────────────
      - name: Deploy to Nomad
        run: |
          SERVICE=${{ matrix.service }}
          VERSION=${{ steps.semver.outputs.version }}

          case $SERVICE in
            api)             PORT=3000; TEMPLATE=deployments/microservice.nomad ;;
            ai)              PORT=3001; TEMPLATE=deployments/microservice.nomad ;;
            auth)            PORT=3002; TEMPLATE=deployments/auth.nomad         ;;
            stats_consumer)  PORT=0;    TEMPLATE=deployments/worker.nomad       ;;
            *)
              echo "Unknown service: $SERVICE"
              exit 1
              ;;
          esac

          DEPLOY_SUCCESS=false
          for IP in ${{ secrets.NOMAD_IPS }}; do
            export NOMAD_ADDR="http://$IP:4646"

            NOMAD_ARGS=(
              -var="service_name=$SERVICE"
              -var="version=$VERSION"
              -var="github_token=${{ secrets.GH_TOKEN_DOWNLOAD }}"
            )
            [ "$PORT" -gt 0 ] && NOMAD_ARGS+=(-var="port=$PORT")

            # Replace hardcoded job name with service name so api/ai don't conflict
            # -detach submits the job and returns immediately (no blocking on health checks)
            if sed -E "s/^job \"(service|worker)\"/job \"$SERVICE\"/" "$TEMPLATE" \
               | nomad job run -detach "${NOMAD_ARGS[@]}" -; then
              echo "✅ Deployed $SERVICE $VERSION to $IP"
              DEPLOY_SUCCESS=true
              break
            else
              echo "❌ Deploy to $IP failed — trying next node..."
            fi
          done

          if [ "$DEPLOY_SUCCESS" = false ]; then
            echo "🚨 All Nomad nodes failed. Check cluster status."
            exit 1
          fi
